appId: com.cloakbrowser.app
productName: CloakBrowserDesktop
directories:
  buildResources: build
extraResources:
  - from: build/icon.png
    to: icon.png
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/cloakbrowser/**
  - node_modules/playwright-core/**
win:
  executableName: CloakBrowserDesktop
  icon: build/icon.ico
mac:
  icon: build/icon.icns
  artifactName: ${name}-${version}-mac-${arch}.${ext}
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Utility
  artifactName: ${name}-${version}-linux-${arch}.${ext}
publish:
  provider: github
  owner: yt2399
  repo: CloakBrowserDesktop
nsis:
  artifactName: ${name}-${version}-windows-${arch}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  license: build/installer-license.rtf
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
