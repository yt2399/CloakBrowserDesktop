name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck and bundle
        run: npm run build

      - name: Verify Windows package can be built
        run: npx electron-builder --win nsis --x64 --publish never
